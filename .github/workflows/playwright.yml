name: Playwright Tests

on:
  push:
     branches: [ main, master ]
  pull_request:
     branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *' #  02:00
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Get Playwright version
      run: echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_ENV
    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}  
    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
    - name: Install Playwright Operating System Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps
    - name: Get changed test files
      id: changed
      if: github.event_name == 'push' || github.event_name == 'pull_request'
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          BASE=${{ github.event.pull_request.base.sha }}
        else
          BASE=HEAD~1
        fi
        CHANGED=$(git diff --name-only $BASE HEAD | grep 'tests/.*\.spec\.ts' | tr '\n' ' ')
        echo "tests=$CHANGED" >> $GITHUB_OUTPUT
    - name: Run Smoke + Changed Tests
      if: github.event_name == 'push' || github.event_name == 'pull_request'
      run: |
        # Smoke api project separetly, e2e 
        npx playwright test --grep @smoke --project=api 
        mv results.xml results-api.xml
        npx playwright test --grep @smoke --project=chromium --project=firefox --project=webkit
        mv results.xml results-e2e.xml
        # updated tests
        if [ -n "${{ steps.changed.outputs.tests }}" ]; then
          npx playwright test ${{ steps.changed.outputs.tests }}
          mv results.xml results-changed.xml
        fi
    - name: Run Full Test Suite
      if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
      run: npm run test:full
    - name: Publish Test Report to Summary
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: 'results-*.xml'
        detailed_summary: true
        include_passed: true
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
    - name: Send Custom Mail
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "QA Report: ${{ github.workflow }} - ${{ job.status }}"
        to: olga.butkalyuk@gmail.com
        from: Playwright Automation
        html_body: |
          <h3>Test Results Summary</h3>
          <p><b>Workflow:</b> ${{ github.workflow }}</p>
          <p><b>Status:</b> ${{ job.status == 'success' && '✅ PASSED' || '❌ FAILED' }}</p>
          <p><b>Run Details:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Click here to see detailed summary and errors</a></p>
          <p><i>Check GitHub Artifacts for full HTML report with screenshots.</i></p>
          <p><i>Artifacts are available for 7 days.</i></p>
